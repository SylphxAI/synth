name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  risk-classification:
    name: risk-classification/pass
    runs-on: [self-hosted, sylphx, linux, standard]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: ADR-29 risk classification
        uses: SylphxAI/.github/.github/actions/adr29-admission@main
        with:
          mode: classify
          policy-mode: observe

  ci:
    runs-on: [self-hosted, sylphx, linux, standard]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun test

  trunk-admission:
    name: trunk-admission/pass
    runs-on: [self-hosted, sylphx, linux, standard]
    needs:
      - risk-classification
      - ci
    if: ${{ !cancelled() }}
    steps:
      - name: ADR-29 trunk admission
        uses: SylphxAI/.github/.github/actions/adr29-admission@main
        with:
          mode: fan-in
          policy-mode: observe
          upstream-results-json: ${{ toJSON(needs) }}
