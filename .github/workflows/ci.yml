name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  risk-classification:
    name: risk-classification/pass
    runs-on: [self-hosted, sylphx, linux, standard]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: ADR-29 risk classification
        uses: SylphxAI/.github/.github/actions/adr29-admission@main
        with:
          mode: classify
          policy-mode: observe

  ci:
    runs-on: [self-hosted, sylphx, linux, standard]
    env:
      SYNTH_RUST_HOME: /tmp/synth-rust-${{ github.run_id }}-${{ github.run_attempt }}
      CARGO_HOME: /tmp/synth-rust-${{ github.run_id }}-${{ github.run_attempt }}/.cargo
      RUSTUP_HOME: /tmp/synth-rust-${{ github.run_id }}-${{ github.run_attempt }}/.rustup
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Prepare isolated Rust home
        run: |
          mkdir -p "$SYNTH_RUST_HOME" "$CARGO_HOME" "$RUSTUP_HOME"
          echo "HOME=$SYNTH_RUST_HOME" >> "$GITHUB_ENV"
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Pre-fetch Rust dependencies
        run: |
          set -euo pipefail
          for manifest in crates/wasm-js/Cargo.toml crates/wasm-md/Cargo.toml; do
            for attempt in 1 2 3; do
              if cargo fetch --manifest-path "$manifest"; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                exit 1
              fi
              sleep $((attempt * 10))
            done
          done

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Build
        run: bunx turbo build --concurrency=1

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun test

  trunk-admission:
    name: trunk-admission/pass
    runs-on: [self-hosted, sylphx, linux, standard]
    needs:
      - risk-classification
      - ci
    if: ${{ !cancelled() }}
    steps:
      - name: ADR-29 trunk admission
        uses: SylphxAI/.github/.github/actions/adr29-admission@main
        with:
          mode: fan-in
          policy-mode: observe
          upstream-results-json: ${{ toJSON(needs) }}

  postsubmit-proof:
    name: postsubmit-proof/pass
    runs-on: [self-hosted, sylphx, linux, standard]
    needs:
      - risk-classification
      - ci
      - trunk-admission
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && !cancelled() }}
    steps:
      - name: ADR-29 postsubmit proof
        uses: SylphxAI/.github/.github/actions/adr29-admission@main
        with:
          mode: postsubmit-proof
          policy-mode: enforce
          upstream-results-json: ${{ toJSON(needs) }}

  recovery-decision:
    name: recovery-decision/pass
    runs-on: [self-hosted, sylphx, linux, standard]
    needs:
      - risk-classification
      - ci
      - trunk-admission
      - postsubmit-proof
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.postsubmit-proof.result != 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: ADR-29 recovery decision
        uses: SylphxAI/.github/.github/actions/adr29-admission@main
        with:
          mode: recovery-decision
          policy-mode: observe
          upstream-results-json: ${{ toJSON(needs) }}
